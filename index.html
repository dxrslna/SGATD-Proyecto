<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Gestión de Actividades - BUAP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <div class="header-left">
      <img src="https://galeria.arpa.buap.mx/wp-content/uploads/2022/10/LogoBuap-1024x1022.png" alt="Logo BUAP">
      <h1>Sistema de Gestión de Actividades y Tareas Diarias</h1>
    </div>
    <div class="header-right" style="display: flex; gap: 15px; align-items: center;">
      <button id="btnRequestNotif" class="header-btn" title="Activar recordatorios">🔔</button>
      <button id="btnClearAll" class="header-btn delete-all-btn" title="Borrar todo">🗑️</button>
      <div class="user-icon" title="Perfil">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
        </svg>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="card">
        <h2>Agregar Nueva Tarea</h2>
        <form id="taskForm">
          <input type="text" id="title" placeholder="Título de la tarea" required>
          <textarea id="description" placeholder="Descripción detallada"></textarea>

          <select id="priority" required>
            <option value="" disabled selected>Selecciona la prioridad</option>
            <option value="Alta">Prioridad Alta</option>
            <option value="Media">Prioridad Media</option>
            <option value="Baja">Prioridad Baja</option>
          </select>

          <input type="date" id="dueDate" required>

          <button type="submit">Agregar Tarea</button>
        </form>
      </div>

      <div class="card">
        <h2>Mis Tareas</h2>

        <div class="task-controls">
          <input type="text" id="search" placeholder="Buscar tarea...">
          <select id="filterPriority">
            <option value="all">Todas</option>
            <option value="Alta">Alta</option>
            <option value="Media">Media</option>
            <option value="Baja">Baja</option>
          </select>
          <label class="checkbox-label">
            <input type="checkbox" id="showCompleted"> Mostrar completadas
          </label>
        </div>
        <div class="task-stats" id="stats">Total: 0 · Pendientes: 0 · Próximas 48h: 0</div>

        <div id="tasks" class="tasks-container">
        </div>
      </div>
    </div>
  </main>

  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h3>Editar tarea</h3>
      <form id="editForm">
        <input type="hidden" id="editId">
        <input type="text" id="editTitle" placeholder="Título" required>
        <textarea id="editDescription" placeholder="Descripción"></textarea>
        <select id="editPriority" required>
          <option value="Alta">Prioridad Alta</option>
          <option value="Media">Prioridad Media</option>
          <option value="Baja">Prioridad Baja</option>
        </select>
        <input type="date" id="editDueDate" required>
        <div class="modal-actions">
          <button type="button" id="cancelEdit" class="cancel-btn">Cancelar</button>
          <button type="submit" class="save-btn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
